name: Daily Earnings Analysis

on:
  workflow_dispatch: 
  schedule:
    - cron: '30 9 * * 1-5'

# Added permissions so the bot can save the CSV file
permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run script
        run: python earnings_script.py

      - name: Commit and push changes
        run: |
          git config --global user.name "EarningsBot"
          git config --global user.email "bot@github.com"
          git add reports/*.csv || true
          # Only commit if there are changes to avoid errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update earnings report" && git push)
